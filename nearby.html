<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>附近探索 · 福岡手帳</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="main.png">
    <link rel="apple-touch-icon" href="main.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="福岡行程">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF6B6B">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nearby.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div class="nb-wrap">

        <!-- Header -->
        <div class="nb-header">
            <div class="nb-header-title">
                <span class="nb-header-icon">📍</span>
                <div>
                    <div class="nb-header-main">附近探索</div>
                    <div class="nb-header-sub">AI 推薦・美食景點一把罩</div>
                </div>
            </div>
            <div class="nb-powered">by Gemini AI</div>
        </div>

        <!-- Location Card -->
        <div class="nb-location-card" id="locationCard">
            <div class="nb-loc-top">
                <div class="nb-loc-icon">🗺️</div>
                <div class="nb-loc-info">
                    <div class="nb-loc-label">目前位置</div>
                    <div class="nb-loc-text" id="locText">尚未取得位置</div>
                </div>
                <div class="nb-loc-status" id="locStatus">
                    <span class="nb-loc-dot"></span>
                </div>
            </div>
            <button class="nb-gps-btn" id="gpsBtn">
                <span id="gpsBtnIcon">📡</span>
                <span id="gpsBtnText">取得我的位置</span>
            </button>
        </div>

        <!-- Category Filter -->
        <div class="nb-filter-row">
            <button class="nb-filter-btn active" data-type="all">全部</button>
            <button class="nb-filter-btn" data-type="food">美食</button>
            <button class="nb-filter-btn" data-type="spot">景點</button>
            <button class="nb-filter-btn" data-type="cafe">咖啡廳</button>
            <button class="nb-filter-btn" data-type="shop">購物</button>
        </div>

        <!-- Radius Selector -->
        <div class="nb-radius-row">
            <span class="nb-radius-label">搜尋範圍</span>
            <div class="nb-radius-toggle">
                <button class="nb-radius-btn active" data-radius="300">300m</button>
                <button class="nb-radius-btn" data-radius="500">500m</button>
                <button class="nb-radius-btn" data-radius="1000">1km</button>
                <button class="nb-radius-btn" data-radius="2000">2km</button>
            </div>
        </div>

        <!-- Search Button -->
        <button class="nb-search-btn" id="searchBtn" disabled>
            <span id="searchBtnText">請先取得位置</span>
        </button>

        <!-- Loading -->
        <div class="nb-loading" id="loadingArea" style="display:none">
            <div class="nb-loading-dots"><span></span><span></span><span></span></div>
            <div class="nb-loading-text" id="loadingText">AI 搜尋中，請稍候...</div>
        </div>

        <!-- Results -->
        <div class="nb-result-area" id="resultArea" style="display:none">
            <div class="nb-result-header">
                <span class="nb-result-title">AI 推薦結果</span>
                <span class="nb-result-count" id="resultCount"></span>
            </div>
            <div id="resultList"></div>
        </div>

    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <div class="nav-tabs">
            <a class="nav-tab" href="index.html">
                <span class="nav-icon">🗓️</span>
                <span>行程</span>
            </a>
            <a class="nav-tab" href="calc.html">
                <span class="nav-icon">💴</span>
                <span>換算</span>
            </a>
            <a class="nav-tab" href="translate.html">
                <span class="nav-icon">🍜</span>
                <span>翻譯</span>
            </a>
            <a class="nav-tab" href="vault.html">
                <span class="nav-icon">🎫</span>
                <span>保險箱</span>
            </a>
            <a class="nav-tab" href="usage.html">
                <span class="nav-icon">📊</span>
                <span>AI用量</span>
            </a>
            <a class="nav-tab" href="flight.html">
                <span class="nav-icon">✈️</span>
                <span>班機</span>
            </a>
        </div>
    </nav>

    <!-- Searching full-screen mask -->
    <div class="nb-mask" id="searchingMask">
        <div class="nb-mask-box">
            <div class="nb-mask-spinner"></div>
            <div class="nb-mask-title">AI 搜尋中</div>
            <div class="nb-mask-sub" id="maskSubText">正在尋找附近美食與景點...</div>
        </div>
    </div>

    <script src="js/nearby.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function() {});
    }
    </script>

    <!-- Firebase: Load API keys -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getAnalytics }  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-analytics.js";
        import {
            getFirestore, collection, addDoc, getDocs
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyAAIriMdrL4exmhckQr4MUZLqTPkzmh9_s",
            authDomain:        "trip-a4f93.firebaseapp.com",
            projectId:         "trip-a4f93",
            storageBucket:     "trip-a4f93.firebasestorage.app",
            messagingSenderId: "954243191002",
            appId:             "1:954243191002:web:3046f9b1d576261249d5e3",
            measurementId:     "G-HKMEJH0V8Q"
        };

        const app = initializeApp(firebaseConfig);
        getAnalytics(app);
        const db = getFirestore(app);

        // Load Gemini API key
        (async () => {
            try {
                const snap = await getDocs(collection(db, 'gemini_API'));
                if (!snap.empty) {
                    const key = snap.docs[0].data().key;
                    if (key && typeof window.__setGeminiKey === 'function') {
                        window.__setGeminiKey(key);
                    } else {
                        window.__pendingGeminiKey = key;
                    }
                }
            } catch (e) {
                console.warn('Failed to load Gemini key:', e);
            }
        })();

        // Load Google Maps API key (optional — stored in maps_API collection)
        (async () => {
            try {
                const snap = await getDocs(collection(db, 'maps_API'));
                if (!snap.empty) {
                    const key = snap.docs[0].data().key;
                    if (key && typeof window.__setMapsKey === 'function') {
                        window.__setMapsKey(key);
                    } else {
                        window.__pendingMapsKey = key;
                    }
                }
            } catch (e) {
                // Maps key not required — AI-only mode
            }
        })();

        // Token usage saver
        window.__saveTokenUsage = async function(usageMeta, model) {
            try {
                await addDoc(collection(db, 'tokenUsage'), {
                    model:        model,
                    inputTokens:  usageMeta.promptTokenCount      || 0,
                    outputTokens: usageMeta.candidatesTokenCount  || 0,
                    totalTokens:  usageMeta.totalTokenCount       || 0,
                    ts:           Date.now()
                });
            } catch(e) {}
        };
    </script>

</body>
</html>
